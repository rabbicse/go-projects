version: "3.9"

# Local database stack — backend and frontend run directly on your machine.
# Default config already points to 192.168.0.50; use this compose only if you
# want to run Redis/MongoDB locally instead.

services:
  redis:
    image: redis:7-alpine
    container_name: mtb-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --save 60 1 --loglevel warning
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  mongodb:
    image: mongo:7
    container_name: mtb-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: movie_ticket_booking
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Monitoring (Phase 2) ─────────────────────────────────────────────────────
  # prometheus:
  #   image: prom/prometheus:latest
  #   ports:
  #     - "9090:9090"
